name: CI

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: true

      - name: Verify pnpm lockfile is deduped
        run: pnpm dedupe --check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Verify generated tool registry is up to date
        run: |
          pnpm tool-registry:generate
          git diff --exit-code -- packages/tool-registry/src/generated

      - name: Typecheck
        run: pnpm typecheck

      - name: Dep boundaries
        run: pnpm depcruise

      - name: Knip
        run: pnpm knip

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: true

      - name: Run tests (changed + coverage)
        if: github.event_name == 'pull_request'
        run: pnpm vitest run --changed "origin/${{ github.base_ref }}" --coverage

      - name: Run tests (full + coverage)
        if: github.event_name != 'pull_request'
        run: pnpm test:coverage

      - name: Report coverage
        if: ${{ !cancelled() && (github.event_name == 'pull_request' || github.event_name == 'push') }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          comment-on: ${{ github.event_name == 'pull_request' && 'pr' || 'commit' }}
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: true

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  html-check:
    name: HTML Link Check
    runs-on: ubuntu-latest
    needs:
      - build-web
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Check internal links in built HTML
        uses: wjdp/htmltest-action@master
        with:
          config: .htmltest.yml

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: build-web
    if: |
      github.event_name == 'pull_request'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      statuses: write
    # Soft launch: keep non-blocking until the real baseline scores are
    # observed across a few runs, then drop continue-on-error to make the
    # accessibility / SEO / best-practices assertions hard gates.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: true

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Run Lighthouse CI
        # Posts a per-URL commit status with the Lighthouse scores using the
        # repo's own Actions token (no third-party GitHub App). Read-only on
        # fork PRs, so the status is best-effort there.
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm lighthouse

  upload-release-asset:
    name: Upload Release Asset
    runs-on: ubuntu-latest
    needs:
      - code-check
      - test
      - build-web
      - html-check
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Create tar.zstd archive
        run: tar --zstd -cf "web-dist-${{ github.event.release.tag_name }}.tar.zstd" -C apps/web/dist .

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: web-dist-${{ github.event.release.tag_name }}.tar.zstd

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "web-dist-${{ github.event.release.tag_name }}.tar.zstd" --repo "${{ github.repository }}" --clobber

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - code-check
      - test
      - build-web
      - html-check
    if: github.event_name == 'release'
    permissions:
      contents: read
    environment:
      name: cloudflare-workers
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: true

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Cloudflare Workers production
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

  deploy-staging:
    name: Upload Workers Version
    runs-on: ubuntu-latest
    needs:
      - build-web
      - html-check
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
    environment:
      name: cloudflare-workers-staging
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: true

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Upload Worker Version
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: versions upload --tag "${{ github.ref }}" --message ${{ toJSON(github.event.head_commit.message || github.event.pull_request.title || github.sha) }}
