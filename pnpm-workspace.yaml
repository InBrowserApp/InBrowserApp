packages:
  - "apps/*"
  - "packages/*"
  - "packages/lib/*"
  - "tools/*"

onlyBuiltDependencies:
  - esbuild
  - msw
  - sharp

# Hoist @types/* to the workspace root so a single root tsc run can resolve
# types for every package without each one having to redeclare them. The
# canonical owner of each @types package still lives in the package that
# actually consumes the runtime dep (e.g. @types/react in apps/web).
publicHoistPattern:
  - "@types/*"

# Single source of truth for every external dependency version in the
# workspace. Add new deps here first, then reference them as `catalog:`
# in the relevant package.json. Tool-local runtime deps belong here too —
# the catalog is the version registry, not just a "shared deps" list.
catalog:
  "@astrojs/check": ^0.9.8
  "@astrojs/mdx": ^4.3.14
  "@astrojs/react": ^4.4.2
  "@astrojs/sitemap": ^3.7.2
  "@commitlint/cli": ^20.5.0
  "@commitlint/config-conventional": ^20.5.0
  "@tailwindcss/vite": ^4.1.18
  "@testing-library/react": ^16.3.2
  "@types/node": ^25.1.0
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@vitest/coverage-v8": ^4.1.2
  ajv: ^8.18.0
  ajv-formats: ^3.0.1
  astro: ^5.17.1
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  dependency-cruiser: ^17.3.10
  happy-dom: ^20.8.9
  highlight.js: ^11.11.1
  husky: ^9.1.7
  "@types/js-yaml": ^4.0.9
  js-yaml: ^4.1.1
  knip: ^6.3.0
  lint-staged: ^16.4.0
